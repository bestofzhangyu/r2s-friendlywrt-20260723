# ============================================================
#  NanoPi R2S FriendlyWrt + passwall + passwall2 — GitHub Actions 云编译
#  使用方法:
#    1. 将本项目推送到 GitHub 仓库 (Public 仓库免费)
#    2. 进入仓库 Actions 页面, 选择 "Build R2S Firmware"
#    3. 点击 "Run workflow" 手动触发
#    4. 编译完成后在 Artifacts 中下载固件
# ============================================================
name: Build R2S Firmware

on:
  workflow_dispatch:
    inputs:
      friendlywrt_branch:
        description: 'FriendlyWrt 分支'
        required: true
        default: 'master-v25.12'
        type: choice
        options:
          - master-v25.12
          - master-v22.03

env:
  WORKDIR: friendlywrt-rk3328

jobs:
  build:
    name: Compile R2S Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # === 准备阶段 ===
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "清理磁盘空间..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global http.postBuffer 524288000

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential subversion git g++ zlib1g-dev \
            libncurses5-dev gawk gettext unzip file libssl-dev \
            wget libelf-dev ecj fastjar python3 python3-distutils python3-pyelftools python3-dev python3-venv \
            curl rsync cpio xxd bison flex qemu-utils

      # === 下载源码 ===
      - name: Download FriendlyWrt source
        run: |
          mkdir -p ${{ env.WORKDIR }}
          cd ${{ env.WORKDIR }}

          git clone https://github.com/friendlyarm/repo --depth 1 tools

          tools/repo init -u https://github.com/friendlyarm/friendlywrt_manifests \
            -b ${{ inputs.friendlywrt_branch || 'master-v25.12' }} \
            -m rk3328.xml \
            --repo-url=https://github.com/friendlyarm/repo \
            --no-clone-bundle

          retry=0
          while ! tools/repo sync -c --no-clone-bundle -j4; do
            retry=$((retry + 1))
            echo "同步中断, 第 $retry 次重试..."
            sleep 5
            if [ $retry -gt 30 ]; then
              echo "::error::源码同步失败"
              exit 1
            fi
          done

          echo "源码下载完成"
          du -sh .

      # === 集成 passwall + passwall2 ===
      - name: Integrate passwall + passwall2
        run: |
          cd ${{ env.WORKDIR }}/friendlywrt

          # 直接克隆 passwall 包到 package 目录 (仓库已迁移到 Openwrt-Passwall 组织)
          # 不使用 feeds 方式, 避免与 build.sh 的 feeds install -a 产生重复包
          git clone --depth 1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/passwall-packages
          git clone --depth 1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall.git package/passwall-luci
          git clone --depth 1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall2.git package/passwall2-luci

          echo "passwall + passwall2 集成完成"
          ls -la package/passwall-*/Makefile package/passwall2-*/Makefile 2>/dev/null || true

      # === 安装自定义文件 (uci-defaults 脚本) ===
      - name: Install custom files (uci-defaults)
        run: |
          if [ -d files ]; then
            echo "安装自定义文件..."
            # 复制到 FriendlyWrt common-files
            mkdir -p ${{ env.WORKDIR }}/device/friendlyelec/rk3328/common-files
            cp -r files/* ${{ env.WORKDIR }}/device/friendlyelec/rk3328/common-files/ 2>/dev/null || true
            # 复制到 OpenWrt files/ (备用)
            mkdir -p ${{ env.WORKDIR }}/friendlywrt/files
            cp -r files/* ${{ env.WORKDIR }}/friendlywrt/files/ 2>/dev/null || true
            echo "已安装的自定义文件:"
            find files -type f -exec echo "  /{}" \;
          else
            echo "::warning::未找到 files/ 目录"
          fi

      # === 编译 uboot/kernel + 生成 .config ===
      - name: Build uboot/kernel + Generate config
        run: |
          cd ${{ env.WORKDIR }}

          # 1. 编译 uboot + kernel, 并生成默认 .config
          #    build.sh rk3328.mk 流程:
          #      source rk3328.mk -> install_toolchain -> build_uboot -> build_kernel
          #      -> build_friendlywrt (feeds update/install + patches + mk-friendlywrt.sh)
          #      -> build_sdimg
          #    DEBUG_DOT_CONFIG=1 让 mk-friendlywrt.sh 在 "make defconfig" 后停止, 不编译 friendlywrt
          #    build_sdimg 会因 rootfs 不存在而失败, 用 || true 忽略
          echo "=== 编译 uboot + kernel + 生成 .config (DEBUG 模式) ==="
          DEBUG_DOT_CONFIG=1 ./build.sh rk3328.mk || true

          # 2. 检查 .config 是否生成
          if [ ! -f friendlywrt/.config ]; then
            echo "::error::.config 未生成, uboot/kernel 构建可能失败"
            echo "=== configs 目录 ==="
            ls -la configs/ 2>/dev/null || true
            echo "=== configs/rockchip 目录 ==="
            ls -la configs/rockchip/ 2>/dev/null || true
            exit 1
          fi

          echo "=== .config 已生成 ==="
          wc -l friendlywrt/.config

          # 3. 追加 passwall + passwall2 配置
          cd friendlywrt
          cat >> .config << 'EOF'

          # ===== Passwall + Passwall2 =====
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-passwall2=y

          # ===== 常用网络工具 =====
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_iptables-nft=y
          EOF

          # 4. 让 passwall 配置生效 (处理依赖关系)
          make defconfig

          # 5. 验证 passwall 是否被正确启用
          echo "=== 验证 passwall 配置 ==="
          grep -q 'CONFIG_PACKAGE_luci-app-passwall=y' .config && echo "passwall 已启用" || echo "::warning::passwall 未找到 (可能包定义有问题)"
          grep -q 'CONFIG_PACKAGE_luci-app-passwall2=y' .config && echo "passwall2 已启用" || echo "::warning::passwall2 未找到 (可能包定义有问题)"

          # 6. 删除官方 feeds 中与 passwall 冲突的包符号链接
          #    build.sh 的 feeds install -a 会安装这些包, 与 passwall-packages 中的版本冲突
          echo "=== 删除冲突包 ==="
          for pkg in xray-core v2ray-geodata sing-box chinadns-ng dns2socks hysteria \
              ipt2socks microsocks naiveproxy shadowsocks-libev shadowsocks-rust \
              shadowsocksr-libev simple-obfs tcping trojan-plus tuic-client \
              v2ray-plugin xray-plugin geoview shadow-tls; do
            rm -rf "package/feeds/packages/$pkg" 2>/dev/null || true
          done
          # 删除官方 luci 中的 passwall (如有)
          rm -rf package/feeds/packages/luci-app-passwall 2>/dev/null || true
          rm -rf package/feeds/packages/luci-app-passwall2 2>/dev/null || true
          rm -rf package/feeds/luci/luci-app-passwall 2>/dev/null || true
          rm -rf package/feeds/luci/luci-app-passwall2 2>/dev/null || true

          echo "配置完成"

      # === 编译 friendlywrt ===
      - name: Build FriendlyWrt
        run: |
          cd ${{ env.WORKDIR }}/friendlywrt

          echo "=== 下载源码包 ==="
          make download -j$(nproc) || true

          echo "=== 编译 FriendlyWrt ==="
          make -j$(nproc) || make -j1 V=s

          echo "=== FriendlyWrt 编译完成 ==="

      # === 生成 SD 卡镜像 ===
      - name: Generate SD image
        run: |
          cd ${{ env.WORKDIR }}
          echo "=== 生成 SD 卡镜像 ==="
          sudo ./build.sh sd-img
          echo "=== SD 卡镜像生成完成 ==="

      # === 上传固件 ===
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: r2s-friendlywrt-passwall
          path: |
            ${{ env.WORKDIR }}/out/*.img
            ${{ env.WORKDIR }}/out/*.img.gz
          retention-days: 30
          compression-level: 0

      - name: Show image info
        if: always()
        run: |
          echo "=== 镜像文件 ==="
          ls -lh ${{ env.WORKDIR }}/out/*.img* 2>/dev/null || echo "未找到镜像文件"
          echo ""
          echo "=== 磁盘使用 ==="
          df -h /
